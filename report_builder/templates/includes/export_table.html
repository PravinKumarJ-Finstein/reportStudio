<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>{{ title }}</title>
<style>
	body { font-family: "Helvetica", "Arial", sans-serif; font-size: 11px; color: #1f2933; }
	h1 { font-size: 18px; margin: 0 0 12px; }
	.meta { color: #6b7280; margin-bottom: 14px; font-size: 10px; }
	table { width: 100%; border-collapse: collapse; }
	th, td { border: 1px solid #d1d5db; padding: 6px 8px; text-align: left; vertical-align: top; }
	thead th { background: #f3f4f6; font-weight: 600; }
	tbody tr:nth-child(even) td { background: #fafafa; }
</style>
</head>
<body>
	<h1>{{ title }}</h1>
	<div class="meta">{{ row_count }} row(s) &middot; generated {{ frappe.utils.format_datetime(frappe.utils.now()) }}</div>
	<table>
		<thead>
			<tr>
				{% for h in headers %}<th>{{ h }}</th>{% endfor %}
			</tr>
		</thead>
		<tbody>
			{% for row in rows %}
			<tr>
				{% for cell in row %}<td>{{ "" if cell is none else cell }}</td>{% endfor %}
			</tr>
			{% endfor %}
		</tbody>
	</table>
</body>
</html>
